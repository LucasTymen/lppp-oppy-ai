<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forces de Porter — Analyse Concurrentielle</title>
<!-- STEP 2026-03-06 — Illustration étude concurrentielle + Porter (Rougier & Plé / papeterie) -->
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,600;1,300&display=swap');

  :root {
    --bg: #0c0f14;
    --surface: #13181f;
    --border: #1e2530;
    --text: #e8edf3;
    --muted: #5a6478;
    --accent: #c8f060;
    --accent2: #ff5e3a;
    --accent3: #38b9ff;
    --score5: #ff3a3a;
    --score4: #ff7a3a;
    --score3: #ffd03a;
    --score2: #5adc78;
    --score1: #3affaa;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── HEADER ── */
  .header {
    padding: 48px 40px 0;
    display: flex;
    align-items: flex-end;
    gap: 24px;
  }

  .header-label {
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    font-size: 11px;
    letter-spacing: .22em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }

  .header-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(40px, 6vw, 76px);
    line-height: .92;
    letter-spacing: .02em;
    color: var(--text);
  }

  .header-title span {
    color: var(--accent);
  }

  .header-subtitle {
    font-size: 13px;
    color: var(--muted);
    font-weight: 300;
    max-width: 320px;
    line-height: 1.6;
    margin-left: auto;
    padding-bottom: 6px;
  }

  /* ── LAYOUT ── */
  .wrapper {
    padding: 40px 40px 60px;
    display: grid;
    grid-template-columns: 1fr 420px;
    gap: 32px;
    align-items: start;
  }

  /* ── RADAR SVG ── */
  .radar-wrap {
    position: sticky;
    top: 40px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
  }

  #radar-svg {
    width: 100%;
    max-width: 480px;
    height: auto;
    overflow: visible;
  }

  .radar-legend {
    display: flex;
    flex-wrap: wrap;
    gap: 10px 20px;
    justify-content: center;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: .06em;
  }

  .legend-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* ── CARDS ── */
  .cards {
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px 22px;
    cursor: pointer;
    transition: border-color .25s, transform .2s, box-shadow .25s;
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    inset: 0;
    opacity: 0;
    background: radial-gradient(ellipse at 20% 50%, var(--card-color, #fff) 0%, transparent 70%);
    transition: opacity .3s;
    pointer-events: none;
  }

  .card:hover {
    transform: translateX(-4px);
    box-shadow: 4px 0 0 0 var(--card-color, var(--accent)) inset,
                0 8px 32px rgba(0,0,0,.3);
    border-color: var(--card-color, var(--accent));
  }

  .card:hover::before { opacity: .06; }
  .card.active {
    border-color: var(--card-color, var(--accent));
    box-shadow: 4px 0 0 0 var(--card-color, var(--accent)) inset;
  }

  .card-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }

  .card-name {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: .04em;
    text-transform: uppercase;
    color: var(--text);
  }

  .card-badge {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    font-weight: 600;
    padding: 3px 10px 3px 6px;
    border-radius: 20px;
    background: color-mix(in srgb, var(--card-color) 15%, transparent);
    color: var(--card-color);
    border: 1px solid color-mix(in srgb, var(--card-color) 30%, transparent);
  }

  .badge-score {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    line-height: 1;
  }

  /* Score bar */
  .score-bar {
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin-bottom: 12px;
    overflow: hidden;
  }

  .score-fill {
    height: 100%;
    border-radius: 2px;
    background: var(--card-color);
    width: 0%;
    transition: width .8s cubic-bezier(.16,1,.3,1);
  }

  .card-text {
    font-size: 13px;
    color: var(--muted);
    line-height: 1.65;
    font-weight: 300;
  }

  .card-icon {
    font-size: 28px;
    position: absolute;
    right: 20px;
    bottom: 16px;
    opacity: .12;
    pointer-events: none;
    transition: opacity .3s, transform .3s;
  }

  .card:hover .card-icon { opacity: .22; transform: scale(1.1) rotate(-5deg); }

  /* ── DIVIDER ── */
  hr.sep {
    border: none;
    border-top: 1px solid var(--border);
    margin: 4px 0;
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 860px) {
    .wrapper { grid-template-columns: 1fr; }
    .radar-wrap { position: static; }
    .header { flex-direction: column; align-items: flex-start; }
    .header-subtitle { margin-left: 0; }
  }

  /* ── ENTRY ANIMATION ── */
  .card {
    opacity: 0;
    transform: translateX(30px);
    animation: slideIn .5s cubic-bezier(.16,1,.3,1) forwards;
  }
  @keyframes slideIn {
    to { opacity: 1; transform: translateX(0); }
  }

  /* Noise overlay */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
    opacity: .022;
    pointer-events: none;
    z-index: 9999;
  }
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="header-label">Analyse stratégique</div>
    <div class="header-title">Forces<br>de <span>Porter</span></div>
  </div>
  <div class="header-subtitle">
    Modèle 6 forces appliqué au marché de la papeterie & loisirs créatifs. Intensité évaluée sur une échelle de 1 à 5.
  </div>
</div>

<div class="wrapper">

  <!-- RADAR -->
  <div class="radar-wrap">
    <svg id="radar-svg" viewBox="0 0 480 480" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <filter id="glow">
          <feGaussianBlur stdDeviation="3" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <filter id="softglow">
          <feGaussianBlur stdDeviation="8" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <radialGradient id="fillGrad" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="#c8f060" stop-opacity=".25"/>
          <stop offset="100%" stop-color="#ff5e3a" stop-opacity=".08"/>
        </radialGradient>
      </defs>

      <!-- Grid rings -->
      <g id="rings" stroke="#1e2530" stroke-width="1" fill="none"/>
      <!-- Grid axes -->
      <g id="axes" stroke="#1e2530" stroke-width="1"/>
      <!-- Score fill -->
      <polygon id="radar-fill" fill="url(#fillGrad)" stroke="none"/>
      <!-- Score outline -->
      <polygon id="radar-line" fill="none" stroke="#c8f060" stroke-width="1.5" filter="url(#glow)"/>
      <!-- Score dots -->
      <g id="radar-dots"/>
      <!-- Labels -->
      <g id="labels" font-family="'DM Sans', sans-serif" font-size="12" fill="#5a6478"/>
    </svg>

    <div class="radar-legend">
      <div class="legend-item"><div class="legend-dot" style="background:#ff3a3a"></div> Très forte (5)</div>
      <div class="legend-item"><div class="legend-dot" style="background:#ff7a3a"></div> Forte (4)</div>
      <div class="legend-item"><div class="legend-dot" style="background:#ffd03a"></div> Moyenne (3)</div>
      <div class="legend-item"><div class="legend-dot" style="background:#5adc78"></div> Faible (2)</div>
    </div>
  </div>

  <!-- CARDS -->
  <div class="cards" id="cards-container"></div>

</div>

<script>
const forces = [
  {
    name: "Intensité Concurrentielle",
    score: 5,
    label: "Très Forte",
    text: "Marché saturé entre spécialistes (Cultura, Rougier & Plé), généralistes (Amazon, FNAC) et enseignes discount. La différenciation par le conseil et l'expérience en magasin devient le seul levier durable.",
    icon: "⚔️",
    color: "var(--score5)"
  },
  {
    name: "Pouvoir de Négociation Clients",
    score: 4,
    label: "Forte",
    text: "Clients hyper-informés, habitués à comparer les prix en ligne. La fidélisation est fragile : le prix reste le premier critère de décision pour 68% des acheteurs de fournitures créatives.",
    icon: "🧑‍💼",
    color: "var(--score4)"
  },
  {
    name: "Menace Nouveaux Entrants",
    score: 2,
    label: "Faible",
    text: "Barrières physiques élevées : gestion des stocks, baux commerciaux coûteux, relation fournisseurs établies. Le marché physique est difficile d'accès mais le pure-player digital reste une menace latente.",
    icon: "🚪",
    color: "var(--score2)"
  },
  {
    name: "Menace Produits de Substitution",
    score: 3,
    label: "Moyenne",
    text: "L'art numérique (tablettes graphiques, Procreate) et les loisirs digitaux captent une partie du temps de loisir. Cependant, le retour au tangible post-Covid génère un regain d'intérêt pour le matériel physique.",
    icon: "🔄",
    color: "var(--score3)"
  },
  {
    name: "Pouvoir de Négociation Fournisseurs",
    score: 3,
    label: "Moyenne",
    text: "Marques historiques (Clairefontaine, Moleskine, Faber-Castell) ont un fort pouvoir de marque. Mais R&P représente un canal de distribution clé, lui conférant un levier de négociation non négligeable.",
    icon: "🏭",
    color: "var(--score3)"
  },
  {
    name: "Rôle de l'État (6ème force)",
    score: 2,
    label: "Opportunité",
    text: "Le Pass Culture constitue une opportunité directe de trafic jeune (18–25 ans). Les politiques culturelles soutiennent la filière. Réglementation faible, mais la TVA sur le matériel artistique reste un point de vigilance.",
    icon: "🏛️",
    color: "var(--score1)"
  }
];

const scoreColors = {
  1: "var(--score1)", 2: "var(--score2)", 3: "var(--score3)",
  4: "var(--score4)", 5: "var(--score5)"
};

// ── RADAR BUILD ──
const CX = 240, CY = 240, MAX_R = 160, RINGS = 5;
const N = forces.length;
const angles = forces.map((_, i) => (Math.PI * 2 * i / N) - Math.PI / 2);

function polar(angle, r) {
  return [CX + Math.cos(angle) * r, CY + Math.sin(angle) * r];
}

// Rings
const ringsG = document.getElementById('rings');
for (let r = 1; r <= RINGS; r++) {
  const pts = angles.map(a => polar(a, MAX_R * r / RINGS).join(',')).join(' ');
  const poly = document.createElementNS('http://www.w3.org/2000/svg','polygon');
  poly.setAttribute('points', pts);
  if (r === RINGS) { poly.setAttribute('stroke', '#2a3040'); poly.setAttribute('stroke-width', '1.5'); }
  ringsG.appendChild(poly);
}

// Axes
const axesG = document.getElementById('axes');
angles.forEach(a => {
  const [x, y] = polar(a, MAX_R + 8);
  const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
  line.setAttribute('x1', CX); line.setAttribute('y1', CY);
  line.setAttribute('x2', x); line.setAttribute('y2', y);
  axesG.appendChild(line);
});

// Labels
const labelsG = document.getElementById('labels');
const shortNames = ["Concurrence", "Clients", "Nouveaux\nEntrants", "Substituts", "Fournisseurs", "État"];
angles.forEach((a, i) => {
  const offset = MAX_R + 36;
  const [x, y] = polar(a, offset);
  const t = document.createElementNS('http://www.w3.org/2000/svg', 'text');
  t.setAttribute('x', x); t.setAttribute('y', y);
  t.setAttribute('text-anchor', 'middle');
  t.setAttribute('dominant-baseline', 'middle');
  t.setAttribute('font-size', '11');
  t.setAttribute('font-weight', '600');
  t.setAttribute('fill', '#7a8496');
  t.setAttribute('letter-spacing', '.04em');

  const parts = shortNames[i].split('\n');
  if (parts.length > 1) {
    parts.forEach((p, pi) => {
      const tspan = document.createElementNS('http://www.w3.org/2000/svg', 'tspan');
      tspan.setAttribute('x', x);
      tspan.setAttribute('dy', pi === 0 ? '-6' : '14');
      tspan.textContent = p;
      t.appendChild(tspan);
    });
  } else {
    t.textContent = parts[0];
  }
  labelsG.appendChild(t);

  // Score label near dot
  const dotR = MAX_R * forces[i].score / RINGS;
  const [dx, dy] = polar(a, dotR + 16);
  const scoreT = document.createElementNS('http://www.w3.org/2000/svg', 'text');
  scoreT.setAttribute('x', dx); scoreT.setAttribute('y', dy);
  scoreT.setAttribute('text-anchor', 'middle');
  scoreT.setAttribute('dominant-baseline', 'middle');
  scoreT.setAttribute('font-size', '13');
  scoreT.setAttribute('font-weight', '700');
  scoreT.setAttribute('fill', forces[i].color);
  scoreT.setAttribute('font-family', "'Bebas Neue', sans-serif");
  scoreT.textContent = forces[i].score;
  labelsG.appendChild(scoreT);
});

// Animated fill & line
const radarFill = document.getElementById('radar-fill');
const radarLine = document.getElementById('radar-line');
const dotsG = document.getElementById('radar-dots');

function buildPolygon(scale = 1) {
  return forces.map((f, i) => {
    const r = MAX_R * f.score / RINGS * scale;
    return polar(angles[i], r).join(',');
  }).join(' ');
}

// Animate from 0
let progress = 0;
function animateRadar() {
  progress += .025;
  const s = Math.min(1, progress);
  const eased = s < 1 ? 1 - Math.pow(1 - s, 3) : 1;
  radarFill.setAttribute('points', buildPolygon(eased));
  radarLine.setAttribute('points', buildPolygon(eased));

  dotsG.innerHTML = '';
  forces.forEach((f, i) => {
    const r = MAX_R * f.score / RINGS * eased;
    const [dx, dy] = polar(angles[i], r);
    const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    circle.setAttribute('cx', dx); circle.setAttribute('cy', dy);
    circle.setAttribute('r', 5);
    circle.setAttribute('fill', f.color);
    circle.setAttribute('filter', 'url(#glow)');
    dotsG.appendChild(circle);
  });

  if (progress < 1) requestAnimationFrame(animateRadar);
}

setTimeout(() => requestAnimationFrame(animateRadar), 300);

// ── CARDS BUILD ──
const container = document.getElementById('cards-container');

forces.forEach((f, i) => {
  const pct = (f.score / 5) * 100;

  const card = document.createElement('div');
  card.className = 'card';
  card.style.setProperty('--card-color', f.color);
  card.style.animationDelay = `${i * 80}ms`;

  card.innerHTML = `
    <div class="card-head">
      <div class="card-name">${f.name}</div>
      <div class="card-badge" style="--card-color:${f.color}">
        <span class="badge-score">${f.score}</span>/5 · ${f.label}
      </div>
    </div>
    <div class="score-bar"><div class="score-fill" data-pct="${pct}" style="background:${f.color}"></div></div>
    <div class="card-text">${f.text}</div>
    <div class="card-icon">${f.icon}</div>
  `;

  container.appendChild(card);

  // Hover → highlight radar dot
  card.addEventListener('mouseenter', () => {
    card.classList.add('active');
    highlightAxis(i, true);
  });
  card.addEventListener('mouseleave', () => {
    card.classList.remove('active');
    highlightAxis(i, false);
  });
});

// Animate bars after mount
setTimeout(() => {
  document.querySelectorAll('.score-fill').forEach(el => {
    el.style.transition = 'width 1s cubic-bezier(.16,1,.3,1)';
    el.style.width = el.dataset.pct + '%';
  });
}, 200);

// ── AXIS HIGHLIGHT ──
function highlightAxis(idx, on) {
  const dots = dotsG.querySelectorAll('circle');
  dots.forEach((d, i) => {
    d.setAttribute('r', i === idx && on ? 8 : 5);
    d.style.transition = 'r .2s';
  });
  const labelTexts = labelsG.querySelectorAll('text');
  labelTexts.forEach((el, i) => {
    if (i % 2 === 0) return;
    const forceIdx = Math.floor(i / 2);
    el.setAttribute('fill', forceIdx === idx && on ? '#e8edf3' : forces[forceIdx].color);
  });
}
</script>
</body>
</html>
