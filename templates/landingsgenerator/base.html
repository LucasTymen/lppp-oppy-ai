{% load static %}
<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>{% block title %}Essais — LPPP{% endblock %}</title>
    <style>
        /* Mobile-first, mode nuit par défaut + switch clair/sombre */
        :root, [data-theme="dark"] {
            --bg: #0d0d0d;
            --bg-card: #1a1a1a;
            --text: #e6e6e6;
            --text-muted: #999;
            --accent: #4a9eff;
            --border: #333;
        }
        [data-theme="light"] {
            --bg: #f5f5f5;
            --bg-card: #fff;
            --text: #1a1a1a;
            --text-muted: #666;
            --accent: #0066cc;
            --border: #ddd;
        }
        * { box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            min-height: 100vh;
            padding: 1rem;
            padding-left: max(1rem, env(safe-area-inset-left));
            padding-right: max(1rem, env(safe-area-inset-right));
            padding-bottom: max(1rem, env(safe-area-inset-bottom));
        }
        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }
        .theme-toggle {
            min-width: 44px;
            min-height: 44px;
            padding: 0.5rem;
            border: 1px solid var(--border);
            background: var(--bg-card);
            color: var(--text);
            border-radius: 8px;
            cursor: pointer;
        }
        main { max-width: 720px; margin: 0 auto; }
        h1 { font-size: 1.5rem; margin: 0 0 0.5rem; }
        @media (min-width: 600px) {
            body { padding: 2rem; }
            h1 { font-size: 1.75rem; }
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <div class="toolbar">
        <span>Essais / Prospection</span>
        <button type="button" class="theme-toggle" id="theme-toggle" aria-label="Changer de thème">🌓</button>
    </div>
    <main>
        {% block content %}{% endblock %}
    </main>
    <script>
        (function() {
            var theme = localStorage.getItem('essais-theme') || 'dark';
            document.documentElement.setAttribute('data-theme', theme);
            document.getElementById('theme-toggle').addEventListener('click', function() {
                var next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
                document.documentElement.setAttribute('data-theme', next);
                localStorage.setItem('essais-theme', next);
            });
        })();
    </script>
    {% block extra_js %}{% endblock %}
    {% include "landing_pages/includes/scroll_top_on_load.html" %}
</body>
</html>
