[pytest]
# PostgreSQL uniquement (pas de SQLite). Pour les tests avec DB : make test-cov-docker
django_settings = lppp.settings
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short
testpaths = apps
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
